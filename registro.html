<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NutriDePP</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f2f5; padding: 20px 0;">

    <div class="login-card" style="max-width: 500px;"> <header>
            <h2 style="color: #556B2F;">Crea tu cuenta</h2>
            <p>Únete a la comunidad de NutriDePP</p>
        </header>

        <form id="registroForm">
            <div class="input-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label for="email-reg">Correo Electrónico</label>
                <input type="email" id="email-reg" placeholder="correo@ejemplo.com" required>
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="input-group" style="flex: 1;">
                    <label for="pass-reg">Contraseña</label>
                    <input type="password" id="pass-reg" placeholder="••••••••" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label for="pass-confirm">Confirmar</label>
                    <input type="password" id="pass-confirm" placeholder="••••••••" required>
                </div>
            </div>

            <div class="input-group">
                <label for="objetivo">Tu objetivo principal</label>
                <select id="objetivo" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="perder">Perder peso / Definición</option>
                    <option value="mantener">Mantener salud</option>
                    <option value="ganar">Ganar masa muscular</option>
                    <option value="rendimiento">Rendimiento deportivo</option>
                </select>
            </div>

            <button type="submit" class="btn-login" style="background: #7C4DFF;">Registrarme</button>
        </form>

        <div class="login-footer">
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>
    </div>

    <script>
    document.getElementById('registroForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email-reg').value;
    const pass = document.getElementById('pass-reg').value;
    const p2 = document.getElementById('pass-confirm').value;

    if (pass !== p2) {
        alert("Las contraseñas no coinciden.");
        return;
    }

    // GUARDAR DATOS: Guardamos un objeto con la info del usuario
    const usuario = {
        email: email,
        password: pass
    };

    // Lo guardamos en LocalStorage convertido a texto
    localStorage.setItem('usuarioRegistrado', JSON.stringify(usuario));

    alert('¡Cuenta creada con éxito! Ahora puedes iniciar sesión.');
    window.location.href = 'login.html'; // Nos manda al login
});
    </script>
</body>
</html>
