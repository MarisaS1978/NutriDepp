<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NutriDePP</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f2f5;">

    <div class="login-card">
        <header style="background: transparent; color: #212121; padding: 1rem;">
            <img src="Assets/Logo 2 1.png" alt="Logo" style="height: 80px; margin-bottom: 10px;">
            <h2 style="color: #556B2F;">Bienvenido a NutriDePP</h2>
            <p>Tu salud, bajo control</p>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="login-footer">
            <p><a href="recuperar.html">Olvidé mi contraseña</a></p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

            <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>

            <a href="index.html" style="color: #7C4DFF; text-decoration: none; font-size: 0.9rem;">← Volver al
                inicio</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const emailIngresado = document.getElementById('email').value;
            const passIngresada = document.getElementById('password').value;

            // BUSCAR DATOS: Obtenemos el usuario que guardamos en el registro
            const datosGuardados = localStorage.getItem('usuarioRegistrado');

            if (datosGuardados) {
                const usuario = JSON.parse(datosGuardados); // Convertimos el texto a objeto otra vez

                // COMPARAR: ¿Coinciden los datos?
                if (emailIngresado === usuario.email && passIngresada === usuario.password) {
                    alert('¡Bienvenido de nuevo a NutriDePP!');
                    // Guardamos que el usuario está "logueado" actualmente
                    sessionStorage.setItem('sesionActiva', 'true');
                    window.location.href = 'index.html';
                } else {
                    alert('Correo o contraseña incorrectos. Inténtalo de nuevo.');
                }
            } else {
                alert('No hay ninguna cuenta registrada con este correo.');
            }
        });
    </script>
</body>

</html>
