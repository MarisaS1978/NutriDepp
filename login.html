<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NutriDePP</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%); margin: 0;">

    <div style="position: absolute; width: 300px; height: 300px; background: rgba(124, 77, 255, 0.05); border-radius: 50%; top: -100px; left: -100px; z-index: 0;"></div>
    
    <div class="login-card animacion-entrada" style="position: relative; z-index: 1;">
        <header style="background: transparent; color: #212121; padding: 1rem; text-align: center;">
            <img src="Assets/Logo 2 1.png" alt="Logo" style="height: 90px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
            <h2 style="color: #556B2F; font-size: 1.8rem; margin-bottom: 5px;">¡Hola de nuevo!</h2>
            <p style="color: #666; font-size: 0.95rem;">Ingresa a tu panel de NutriDePP</p>
        </header>

        <form id="loginForm" style="margin-top: 1rem;">
            <div class="input-group">
                <label for="email"><i class="fa-regular fa-envelope"></i> Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" style="margin-top: 10px; width: 100%; letter-spacing: 0.5px;">
                INICIAR SESIÓN
            </button>
        </form>

        <div class="login-footer" style="text-align: center; margin-top: 20px;">
            <p style="margin-bottom: 15px;">
                <a href="contraseña.html" style="color: #666; font-size: 0.85rem; text-decoration: none;">¿Olvidaste tu contraseña?</a>
            </p>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <p style="font-size: 0.95rem; color: #444;">
                ¿No tienes cuenta? 
                <a href="javascript:void(0)" onclick="transicionSalida('registro.html')" style="color: #7C4DFF; font-weight: bold; text-decoration: none;">
                    Regístrate aquí
                </a>
            </p>

            <div style="margin-top: 25px;">
                <a href="index.html" style="color: #556B2F; text-decoration: none; font-size: 0.9rem; font-weight: 600;">
                    <i class="fa-solid fa-arrow-left"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script>
        // Tu lógica de JS se mantiene igual, funciona perfecto.
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const emailIngresado = document.getElementById('email').value;
            const passIngresada = document.getElementById('password').value;
            const datosGuardados = localStorage.getItem('usuarioRegistrado');

            if (datosGuardados) {
                const usuario = JSON.parse(datosGuardados);
                if (emailIngresado === usuario.email && passIngresada === usuario.password) {
                    sessionStorage.setItem('sesionActiva', 'true');
                    window.location.href = 'index.html';
                } else {
                    alert('Correo o contraseña incorrectos.');
                }
            } else {
                alert('No hay ninguna cuenta registrada.');
            }
        });

        function transicionSalida(url) {
            const card = document.querySelector('.login-card');
            card.style.transform = 'translateY(-20px)';
            card.style.opacity = '0';
            card.style.transition = '0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(() => { window.location.href = url; }, 400);
        }
    </script>
</body>
</html>
